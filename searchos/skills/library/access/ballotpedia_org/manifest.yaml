description: 'Access skill for Ballotpedia political encyclopedia.


  Extracts structured data from Ballotpedia pages including:

  - Person infoboxes (politicians, officials) with biographical data

  - Cabinet and officeholder listings with member details

  - Election results tables with vote counts and percentages


  Note: Site uses AWS WAF protection requiring browser-based extraction.'
params_schema:
  function:
    type: string
    required: true
    description: "要调用的功能名。可用值:\n  - person   Extract person infobox data including name, party, education,\
      \ offices held, election history\n  - office   Extract office/cabinet page data including lists\
      \ of officeholders and their details\n  - election   Extract election results tables from a Ballotpedia\
      \ page\n  - page   Get basic page metadata including title and section structure"
  url:
    type: string
    required: false
    description: URL of a Ballotpedia person page
