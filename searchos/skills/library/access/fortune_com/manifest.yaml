description: Access Fortune Global 500 rankings and company profiles with financial data, rankings history,
  and company information.
params_schema:
  function:
    type: string
    required: true
    description: "要调用的功能名。可用值:\n  - get_global500_ranking   Get Fortune Global 500 ranking list with company\
      \ data including revenue, profits, assets, employees, and rank changes.\n  - get_company_profile\
      \   Get detailed company profile from Fortune including financial data, rankings history, and company\
      \ information.\n  - search_companies   Search for companies in Global 500 rankings by name."
  year:
    type: string
    required: false
    description: 'Year of ranking (default: latest). Available years: 1995-2025'
    default: latest
  limit:
    type: integer
    required: false
    description: 'Maximum number of results to return (default: 500, max: 500)'
    default: 500
  offset:
    type: integer
    required: false
    description: 'Number of results to skip for pagination (default: 0)'
    default: 0
  company:
    type: string
    required: false
    description: Company slug (e.g., 'walmart', 'state-grid', 'amazon-com'),  path (e.g., '/company/walmart/'),
      or full URL
  query:
    type: string
    required: false
    description: Search query (company name)
