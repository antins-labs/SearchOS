description: >-
  Access structured data from the OpenStreetMap Wiki, including UK Areas of Outstanding
  Natural Beauty (AONB), National Scenic Areas (NSA), and other wikitable datasets with
  OSM relation IDs.
params_schema:
  function:
    type: string
    required: true
    description: |
      要调用的功能名。可用值:
        - get_aonb_data     获取英国 AONB 和 NSA 数据(无需其他参数)
        - get_page_tables   从任意 OSM Wiki 页面提取 wikitable(需要 page_title,可选 table_class)
        - search_pages      按关键词搜索 wiki 页面(需要 search_term,可选 limit)
  page_title:
    type: string
    required: false
    description: Wiki 页面标题(URL 格式),如 United_Kingdom。仅 get_page_tables 使用,该 function 下必填。
  table_class:
    type: string
    required: false
    description: 要提取的表格 CSS class。仅 get_page_tables 使用。
    default: wikitable
  search_term:
    type: string
    required: false
    description: 搜索关键词。仅 search_pages 使用,该 function 下必填。
  limit:
    type: integer
    required: false
    description: 搜索结果最大条数。仅 search_pages 使用。
    default: 10
