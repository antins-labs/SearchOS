description: >-
  Extracts structured content from taylorswift.fandom.com including infoboxes, tables,
  tour dates, and page content. Uses Wayback Machine archives when direct access is blocked.

params_schema:
  function:
    type: string
    required: true
    description: |
      要调用的功能名。可用值:
        - get_page        Get complete page data including infobox, content, tables, sections
        - search          Search for pages in the wiki
        - get_infobox     Get only infobox data from a page
        - get_tables      Get only table data from a page
        - get_tour_dates  Extract tour date information from a tour page

  page_title:
    type: string
    required: false
    description: The wiki page title (e.g., "Reputation_Stadium_Tour", "Taylor Swift"). Required for get_page, get_infobox, get_tables, get_tour_dates.

  query:
    type: string
    required: false
    description: Search query string. Required for search function.

  limit:
    type: integer
    required: false
    default: 10
    description: Maximum number of search results to return. Used by search function.