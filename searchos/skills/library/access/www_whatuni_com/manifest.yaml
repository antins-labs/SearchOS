description: >-
  Access university course listings and details from WhatUni.com UK higher education
  course database, including search by subject/university, detailed course info,
  and university profiles.

params_schema:
  function:
    type: string
    required: true
    description: |
      要调用的功能名。可用值:
        - search_courses        搜索课程，可按subject、university、level筛选
        - get_course_detail     获取课程详细信息，需要url或course_slug+university_slug
        - search_universities   搜索大学，可选query参数
  
  subject:
    type: string
    required: false
    description: |
      Subject slug for course search (e.g., 'communication-studies', 'computer-science').
      Used by search_courses function.
  
  university:
    type: string
    required: false
    description: |
      University name slug for filtering (e.g., 'goldsmiths-university-of-london').
      Used by search_courses function.
  
  level:
    type: string
    required: false
    description: |
      Course level - 'undergraduate' or 'postgraduate'. Defaults to 'postgraduate'.
      Used by search_courses function.
    default: postgraduate
  
  page:
    type: integer
    required: false
    description: |
      Page number for paginated results. Defaults to 1.
      Used by search_courses and search_universities functions.
    default: 1
  
  url:
    type: string
    required: false
    description: |
      Full URL to the course detail page.
      Used by get_course_detail function as alternative to course_slug+university_slug.
  
  course_slug:
    type: string
    required: false
    description: |
      Course name slug from URL (e.g., 'pgdip-in-digital-media-theory').
      Used by get_course_detail function (requires university_slug).
  
  university_slug:
    type: string
    required: false
    description: |
      University name slug from URL (e.g., 'goldsmiths-university-of-london').
      Used by get_course_detail function (requires course_slug).
  
  query:
    type: string
    required: false
    description: |
      Search query for university name.
      Used by search_universities function.