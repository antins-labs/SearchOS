description: >-
  Extracts news article content and special topic pages from CCTV News (news.cctv.com), including article text, metadata, and related images.

params_schema:
  function:
    type: string
    required: true
    description: |
      要调用的功能名。可用值:
        - fetch_article   提取新闻文章内容，需要 url 参数
        - fetch_special_page   提取专题页面内容，需要 url 参数
        - search_articles   搜索首页文章列表，可选 max_articles 参数限制数量
        - extract_metadata   仅提取页面元数据，需要 url 参数
  
  url:
    type: string
    required: false
    description: 目标页面的完整URL（用于 fetch_article、fetch_special_page 和 extract_metadata 功能）
  
  max_articles:
    type: integer
    required: false
    description: 返回的最大文章数量，默认20（用于 search_articles 功能）
    default: 20