description: >-
  Access event listings and details from the Coca-Cola Coliseum venue website (www.coca-colacoliseum.com).
params_schema:
  function:
    type: string
    required: true
    description: |
      要调用的功能名。可用值:
        - get_events       获取场馆即将举办的活动列表;可选 url(默认 events 列表页)
        - get_event_detail 获取某个活动详情页信息;需要 url
        - search_events    按标题/关键词搜索活动;需要 query
  url:
    type: string
    required: false
    description: 要抓取的页面 URL。get_event_detail 必填(活动详情页);get_events 可选(默认活动列表页)。
  query:
    type: string
    required: false
    description: 活动搜索关键词(匹配标题/slug/tagline)。仅 search_events 使用。
