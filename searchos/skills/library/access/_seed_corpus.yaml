# Access-skill seed corpus
# -------------------------
# Driven by ``searchos.skills.access_bake``. Each entry describes one
# target site: canonical URL pattern + 2-3 real probe URLs used for
# profiling, generation, and held-out validation.
#
# Selection criteria (important for pass-rate):
#   - Must serve static HTML or a public JSON API (no Cloudflare JS
#     challenge, no login wall, no aggressive rate-limiting).
#   - URL-routed entries need a canonical URL pattern (`/wiki/X`,
#     `/abs/Y`, `/quote/Z`) — the page IS the entity.
#   - Agent-called entries are picked for sites where the agent needs
#     to search / query with parameters (no single canonical URL).
#
# Field schema per entry:
#   host             — bare domain (no scheme, no trailing slash)
#   canonical        — human-readable URL template (`{slug}`, `{id}`, …)
#                      blank for agent_called
#   probe_urls       — 2-3 real URLs; first N-1 used for profiling,
#                      last held out for Gate C live validation.
#                      For agent_called, these are example target pages
#                      the skill should be able to reach via its query.
#   invocation_hint  — url_routed | agent_called | unknown (profiler
#                      decides if unknown)
#   notes            — optional site-specific caveats
#
# NOTE: 10 categories. Sites already in the library (from the hand-
# written layer) are not re-baked here — the baker skips hosts it
# detects in existing manifests.

version: 1
pilot: false

categories:

  # ─────────────────────────────────────────────────────────────
  # reference — 百科 / 知识库
  # ─────────────────────────────────────────────────────────────
  reference:
    - host: developer.mozilla.org
      canonical: "/en-US/docs/{path}"
      invocation_hint: url_routed
      probe_urls:
        - "https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Array"
        - "https://developer.mozilla.org/en-US/docs/Web/CSS/flex"
        - "https://developer.mozilla.org/en-US/docs/Web/API/fetch"
      notes: "Static HTML with JSON-LD and well-structured article layout."

    - host: simple.wikipedia.org
