      invocation_hint: url_routed
      probe_urls:
        - "https://simple.wikipedia.org/wiki/Albert_Einstein"
        - "https://simple.wikipedia.org/wiki/Photosynthesis"
        - "https://simple.wikipedia.org/wiki/Quantum_mechanics"

    - host: en.wiktionary.org
